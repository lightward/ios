name: Lightward
options:
  bundleIdPrefix: com
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Lightward:
    type: application
    platform: iOS
    sources:
      - path: Lightward
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Lightward/Resources
      - path: Lightward/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lightward
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Lightward/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lightward/Lightward.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        DEVELOPMENT_TEAM: 49Q5LC84AR

  LightwardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LightwardTests
    dependencies:
      - target: Lightward
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lightward.tests
        DEVELOPMENT_TEAM: 49Q5LC84AR
        GENERATE_INFOPLIST_FILE: true
